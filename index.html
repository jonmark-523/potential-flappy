<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Birds Family</title>
  <style>
    :root {
      --sky: #7ec0ee;
      --grass: #4bb543;
      --ground: #d1a55c;
      --pipe: #2f8d2f;
      --text: #ffffff;
      --shadow: rgba(0, 0, 0, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #87ceeb 0%, #7ec0ee 50%, #a2d9ff 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrapper {
      width: min(460px, 100%);
      position: relative;
      text-align: center;
    }

    canvas {
      width: 100%;
      max-width: 460px;
      border-radius: 18px;
      box-shadow: 0 18px 40px var(--shadow);
      background: linear-gradient(180deg, #7dd0ff 0%, #6ec6ff 100%);
      display: block;
      margin: 0 auto;
    }

    .ui-panel {
      position: absolute;
      width: 100%;
      height: 100%;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .menu,
    .game-over {
      width: calc(100% - 40px);
      max-width: 380px;
      padding: 22px;
      border-radius: 18px;
      background: rgba(17, 85, 128, 0.92);
      border: 2px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.24);
      pointer-events: auto;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.2em;
      margin-bottom: 14px;
      text-transform: uppercase;
      text-shadow: 0 4px 8px rgba(0, 0, 0, 0.22);
    }

    .subtitle {
      opacity: 0.78;
      margin-bottom: 18px;
      font-size: 0.95rem;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      color: #fff;
      background: linear-gradient(180deg, #62c462 0%, #49a544 100%);
      box-shadow: 0 10px 20px rgba(0,0,0,0.16);
    }

    .btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(180deg, #77d877 0%, #56b56e 100%);
    }

    .btn.secondary {
      background: rgba(255,255,255,0.12);
      color: #eef8ff;
      box-shadow: 0 10px 18px rgba(0,0,0,0.14);
    }

    .score-panel,
    .best-panel {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.95rem;
      color: #cfe9ff;
    }

    .score-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 12px 14px;
      border-radius: 14px;
      min-width: 100px;
    }

    .hint {
      margin-top: 16px;
      font-size: 0.88rem;
      opacity: 0.84;
    }

    .small-label {
      font-size: 0.82rem;
      opacity: 0.72;
    }

    .top-bar {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.88rem;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="ui-panel" id="uiPanel"></div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiPanel = document.getElementById('uiPanel');

    const game = {
      width: canvas.width,
      height: canvas.height,
      gravity: 0.45,
      jumpPower: -9.4,
      pipeGap: 145,
      pipeDistance: 220,
      speed: 2.4,
      frameCount: 0,
      bestScore: 0,
      score: 0,
      state: 'menu',
      bird: null,
      pipes: [],
      ground: null,
      titleOffset: 0,
      selectedBird: 0,
      menuOptions: ['1P', 'Bird', 'Play']
    };

    const birdStyles = [
      { color: '#ffcc00', outline: '#bf8b00' },
      { color: '#4bd5ff', outline: '#2b9db1' },
      { color: '#ff7b9b', outline: '#c24a60' }
    ];

    function createBird() {
      return {
        x: 90,
        y: game.height / 2 - 18,
        radius: 16,
        velocity: 0,
        rotation: 0
      };
    }

    function restartGame() {
      game.score = 0;
      game.pipes = [];
      game.frameCount = 0;
      game.bird = createBird();
      game.ground = game.height - 100;
      game.state = 'playing';
      updateUI();
    }

    function spawnPipe() {
      const topHeight = 80 + Math.random() * 180;
      game.pipes.push({ x: game.width + 60, top: topHeight, passed: false });
    }

    function updateMenuUI() {
      uiPanel.innerHTML = `
        <div class="menu">
          <h1>Flappy Birds</h1>
          <p class="subtitle">Family edition with clean UI and smooth controls.</p>
          <div class="score-panel">
            <div class="score-box"><div class="small-label">BEST</div><strong>${game.bestScore}</strong></div>
            <div class="score-box"><div class="small-label">CURRENT</div><strong>${game.score}</strong></div>
          </div>
          <div class="button-row">
            <button class="btn secondary" id="togglePlayer">1P</button>
            <button class="btn secondary" id="toggleBird">BIRD ${game.selectedBird + 1}</button>
            <button class="btn" id="playBtn">PLAY</button>
          </div>
          <p class="hint">Press Space or click to flap. Avoid the pipes and reach a high score.</p>
        </div>
      `;

      document.getElementById('toggleBird').addEventListener('click', () => {
        game.selectedBird = (game.selectedBird + 1) % birdStyles.length;
        updateUI();
      });
      document.getElementById('playBtn').addEventListener('click', restartGame);
      document.getElementById('togglePlayer').addEventListener('click', () => {
        alert('Single player mode only for this version. Enjoy!');
      });
    }

    function updateGameOverUI() {
      uiPanel.innerHTML = `
        <div class="game-over">
          <h1>Game Over</h1>
          <div class="score-panel">
            <div class="score-box"><div class="small-label">SCORE</div><strong>${game.score}</strong></div>
            <div class="score-box"><div class="small-label">BEST</div><strong>${game.bestScore}</strong></div>
          </div>
          <div class="button-row">
            <button class="btn" id="retryBtn">RETRY</button>
            <button class="btn secondary" id="menuBtn">MENU</button>
          </div>
          <p class="hint">Tap or press space to restart. Keep the bird flying!</p>
        </div>
      `;
      document.getElementById('retryBtn').addEventListener('click', restartGame);
      document.getElementById('menuBtn').addEventListener('click', () => {
        game.state = 'menu';
        updateUI();
      });
    }

    function updateUI() {
      if (game.state === 'menu') {
        updateMenuUI();
      } else if (game.state === 'gameover') {
        updateGameOverUI();
      } else {
        uiPanel.innerHTML = '';
      }
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, game.height);
      gradient.addColorStop(0, '#82d8ff');
      gradient.addColorStop(0.5, '#7bc6ff');
      gradient.addColorStop(1, '#5fafff');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, game.width, game.height);

      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        ctx.ellipse(80 + i * 120, 110 + Math.sin((game.frameCount + i * 20) / 50) * 4, 42, 24, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawGround() {
      ctx.fillStyle = '#4db54d';
      ctx.fillRect(0, game.ground, game.width, game.height - game.ground);
      ctx.fillStyle = '#c99859';
      ctx.fillRect(0, game.ground + 30, game.width, 20);
    }

    function drawBird() {
      const style = birdStyles[game.selectedBird];
      ctx.save();
      ctx.translate(game.bird.x, game.bird.y);
      ctx.rotate(game.bird.rotation);
      ctx.fillStyle = style.color;
      ctx.strokeStyle = style.outline;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, game.bird.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(6, -4, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(8, -4, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.fillStyle = '#dd9c31';
      ctx.moveTo(18, 0);
      ctx.lineTo(10, -3);
      ctx.lineTo(10, 4);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawPipes() {
      ctx.fillStyle = '#3e8c3e';
      ctx.strokeStyle = '#2e6d2e';
      ctx.lineWidth = 4;
      game.pipes.forEach(pipe => {
        const x = pipe.x;
        const topHeight = pipe.top;
        ctx.fillRect(x, 0, 64, topHeight);
        ctx.strokeRect(x, 0, 64, topHeight);
        ctx.fillRect(x, topHeight + game.pipeGap, 64, game.height - game.ground - (topHeight + game.pipeGap));
        ctx.strokeRect(x, topHeight + game.pipeGap, 64, game.height - game.ground - (topHeight + game.pipeGap));
      });
    }

    function drawScore() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(16, 16, 120, 44);
      ctx.fillStyle = '#fff';
      ctx.font = '600 28px Segoe UI';
      ctx.fillText(game.score, 32, 47);
    }

    function updateGame() {
      if (game.state !== 'playing') return;
      game.frameCount += 1;
      if (game.frameCount % 110 === 0) spawnPipe();

      game.bird.velocity += game.gravity;
      game.bird.y += game.bird.velocity;
      game.bird.rotation = Math.min((game.bird.velocity / 10) * 0.6, 0.9);

      if (game.bird.y + game.bird.radius > game.ground) {
        finishGame();
      }

      game.pipes.forEach(pipe => {
        pipe.x -= game.speed;
        const birdLeft = game.bird.x - game.bird.radius;
        const birdRight = game.bird.x + game.bird.radius;
        const pipeLeft = pipe.x;
        const pipeRight = pipe.x + 64;
        if (!pipe.passed && birdLeft > pipeRight) {
          pipe.passed = true;
          game.score += 1;
          if (game.score > game.bestScore) game.bestScore = game.score;
        }
        if (pipeLeft < birdRight && pipeRight > birdLeft) {
          if (game.bird.y - game.bird.radius < pipe.top || game.bird.y + game.bird.radius > pipe.top + game.pipeGap) {
            finishGame();
          }
        }
      });

      game.pipes = game.pipes.filter(pipe => pipe.x + 64 > -40);
    }

    function finishGame() {
      game.state = 'gameover';
      updateUI();
    }

    function draw() {
      drawBackground();
      drawPipes();
      drawGround();
      drawBird();
      if (game.state === 'playing') drawScore();
      if (game.state === 'menu') {
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fillRect(0, 0, game.width, game.height);
      }
    }

    function loop() {
      updateGame();
      draw();
      requestAnimationFrame(loop);
    }

    function flap() {
      if (game.state === 'menu') {
        restartGame();
        return;
      }
      if (game.state === 'gameover') {
        restartGame();
        return;
      }
      game.bird.velocity = game.jumpPower;
    }

    window.addEventListener('keydown', event => {
      if (event.code === 'Space' || event.code === 'ArrowUp') {
        event.preventDefault();
        flap();
      }
    });

    canvas.addEventListener('click', flap);
    canvas.addEventListener('touchstart', event => {
      event.preventDefault();
      flap();
    }, { passive: false });

    window.addEventListener('load', () => {
      game.bird = createBird();
      game.ground = game.height - 100;
      updateUI();
      loop();
    });
  </script>
</body>
</html>
